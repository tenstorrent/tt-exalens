name: "BUILD TTEXALENS"

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: tt-ubuntu-2204-large-stable
      os:
        required: false
        type: string
        default: "ubuntu-22.04"
      config:
        required: false
        type: string
        default: "Release"
      docker-image:
        required: false
        type: string
        default: "ghcr.io/${{ github.repository }}/tt-exalens-ubuntu-22-04:latest"

run-name: BUILD TTEXALENS by @${{ github.actor }} triggered by ${{ github.event_name }} event (${{ github.ref_name }})

jobs:
  build_libs:
    env:
      CONFIG: ${{ inputs.config }}
      # So we can get all the makefile output we want
      VERBOSE: 1
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ${{ inputs.docker-image }}
    name: "Build tt-exalens"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Git safe dir
        run: git config --global --add safe.directory $(pwd)
      - name: Run pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure
      - name: Build native code and test kernels
        run: |
          make
      - name: Run mypy
        run: |
          make mypy
      - name: Run pyright
        run: |
          make pyright
      - name: Build wheel
        run: |
          make wheel
      - name: Trim SFPI toolchain from build artifacts (keep GDB only)
        run: |
          # GDB is a standalone binary — tests need only it from the SFPI
          # tree (see ttexalens/gdb/gdb_client.py). Drop everything else
          # under build_riscv/sfpi/ and the tarball; kernel ELFs at
          # build_riscv/{wormhole,blackhole}/ are untouched.
          SFPI_DIR=build_riscv/sfpi
          GDB_REL=compiler/bin/riscv-tt-elf-gdb
          if [ -f "$SFPI_DIR/$GDB_REL" ]; then
            mv "$SFPI_DIR/$GDB_REL" /tmp/riscv-tt-elf-gdb
            rm -rf "$SFPI_DIR"
            mkdir -p "$SFPI_DIR/$(dirname "$GDB_REL")"
            mv /tmp/riscv-tt-elf-gdb "$SFPI_DIR/$GDB_REL"
          fi
          rm -f build_riscv/sfpi_*.txz

      - name: Prepare artifact layout for tests
        run: |
          # CMake makes `build -> /abs/build_debug` and
          # `build_debug/riscv-src -> /abs/build_riscv` with absolute paths
          # that don't survive an artifact roundtrip. Tests only need
          # `build/riscv-src/<arch>/*.elf` (kernel ELFs) and
          # `build_riscv/sfpi/compiler/bin/riscv-tt-elf-gdb` (GDB binary).
          # Replace `build/` with a minimal real directory whose only entry
          # is a relative `riscv-src → ../build_riscv` symlink. `build_riscv`
          # itself is uploaded separately, so the symlink resolves on the
          # test runner.
          rm -rf build
          mkdir build
          ln -s ../build_riscv build/riscv-src
      - name: Upload libraries as artifacts
        uses: pyTooling/upload-artifact@v4
        with:
          name: ttexalens-build-${{ inputs.os }}
          path: |
            build
            build_riscv
            ttexalens/_native_ttexalens*.so
            ttexalens/_native_ttexalens/__init__.pyi
